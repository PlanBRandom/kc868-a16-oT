# KC868-A16 Gecko Enclosure Monitor
# 16 enclosures | OI-7530 32-ch gas detection | Bluetooth proxy | NFC/QR tagging
#
# Hardware: Kincony KC868-A16 (ESP32)
#   - 16 relay outputs via PCF8575 I2C expander (address 0x24)
#   - 16 digital inputs via PCF8575 I2C expander (address 0x22)
#   - RS485 (UART2) for OI-7530 32-channel gas detector
#   - Optional: PN532 NFC reader via I2C (address 0x28) for enclosure tag scanning
#
# Verify I2C expander addresses against your specific board revision before flashing.

substitutions:
  device_name: kc868-a16-gecko
  friendly_name: "Gecko Monitor"

  # Hardware pins - KC868-A16
  i2c_sda: GPIO4
  i2c_scl: GPIO5
  rs485_tx: GPIO17
  rs485_rx: GPIO16
  rs485_de: GPIO13   # MAX485 DE/RE direction-control pin

  # ── Vivarium Row A  (Juveniles, enclosures 1–8) ──────────────────────────
  enc_01: "Row A - Enclosure 01"
  enc_02: "Row A - Enclosure 02"
  enc_03: "Row A - Enclosure 03"
  enc_04: "Row A - Enclosure 04"
  enc_05: "Row A - Enclosure 05"
  enc_06: "Row A - Enclosure 06"
  enc_07: "Row A - Enclosure 07"
  enc_08: "Row A - Enclosure 08"

  # ── Vivarium Row B  (Adults, enclosures 9–16) ────────────────────────────
  enc_09: "Row B - Enclosure 09"
  enc_10: "Row B - Enclosure 10"
  enc_11: "Row B - Enclosure 11"
  enc_12: "Row B - Enclosure 12"
  enc_13: "Row B - Enclosure 13"
  enc_14: "Row B - Enclosure 14"
  enc_15: "Row B - Enclosure 15"
  enc_16: "Row B - Enclosure 16"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  # Automatically append MAC so one firmware can run on multiple boards
  name_add_mac_suffix: true

esp32:
  board: esp32dev
  framework:
    type: arduino   # arduino required for full Bluetooth proxy support

# Serial logging (uses UART0 on GPIO1/GPIO3 – separate from RS485 on UART2)
logger:

# Home Assistant API
api:

# Over-the-Air updates
ota:
  - platform: esphome

wifi:
  ap:

# Captive portal for Wi-Fi provisioning
captive_portal:

# ── Bluetooth Proxy ──────────────────────────────────────────────────────────
# Extends Home Assistant Bluetooth range into the vivarium room
esp32_ble_tracker:
  scan_parameters:
    interval: 1100ms
    window: 1100ms
    active: true

bluetooth_proxy:
  active: true

# ── I2C bus (PCF8575 GPIO expanders) ────────────────────────────────────────
i2c:
  sda: ${i2c_sda}
  scl: ${i2c_scl}
  scan: true

# PCF8575 16-bit I2C GPIO expanders
pcf8575:
  - id: relay_expander   # Relay outputs 1-16  (verify address 0x24 for your board)
    address: 0x24
  - id: input_expander   # Digital inputs 1-16 (verify address 0x22 for your board)
    address: 0x22

# ── RS485 / Modbus (OI-7530) ─────────────────────────────────────────────────
uart:
  id: mod_bus
  tx_pin: ${rs485_tx}
  rx_pin: ${rs485_rx}
  baud_rate: 9600
  stop_bits: 1
  parity: NONE

modbus:
  id: modbus1
  uart_id: mod_bus
  flow_control_pin: ${rs485_de}

# OI-7530 32-channel gas detector – Modbus slave address 0x01
# Register map: holding registers, FP32 (2 registers each)
#   Ch 1  = 0x21 (33),  Ch 2  = 0x23 (35), …, Ch N = 0x21 + (N-1)*2
modbus_controller:
  - id: oi7530
    address: 0x01
    modbus_id: modbus1
    setup_priority: -10
    update_interval: 10s

# ── Relay Switches (enclosure heating / lighting control) ────────────────────
switch:
  - platform: gpio
    name: "${enc_01} Relay"
    id: relay_01
    pin: {pcf8575: relay_expander, number: 0,  mode: {output: true}, inverted: false}
