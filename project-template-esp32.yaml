# ── Text Sensors ──────────────────────────────────────────────────────────────
# NFC / QR-code identification
# Each enclosure URL can be encoded as a QR code or written to an NFC tag (e.g. NTAG213).
# Place a printed QR code or NFC sticker on each enclosure for instant dashboard access.
# Optional: attach a PN532 NFC reader via I2C (addr 0x28) and add the nfc: component
#           to enable automated tag-detection automations in Home Assistant.
text_sensor:
  - platform: wifi_info
    ip_address:
      name: "${friendly_name} IP Address"
    ssid:
      name: "${friendly_name} SSID"

  - platform: template
    name: "${enc_01} QR Tag"
    update_interval: never
    lambda: return std::string("http://${device_name}.local/enc/01");
