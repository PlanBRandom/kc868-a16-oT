    modbus_controller_id: oi7530
    name: "${friendly_name} OI7530 Ch 01"
    address: 0x21
    register_type: holding
    value_type: FP32
    unit_of_measurement: "ppm"
    device_class: gas
    accuracy_decimals: 2
