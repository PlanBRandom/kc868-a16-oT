# ── Sensors (WiFi diagnostics + OI-7530 32-channel gas readings) ─────────────
sensor:
  - platform: wifi_signal
    name: "${friendly_name} WiFi Signal"
    update_interval: 60s

  # OI-7530 gas channel readings
  # Register addresses: Ch1=0x21, Ch2=0x23, …, ChN=0x21+(N-1)*2  (FP32 = 2 regs each)
