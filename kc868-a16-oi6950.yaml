# ─── Switches (Relay / MOSFET Outputs) ───────────────────────────────────────

switch:
  # KC868-A16 relay/MOSFET outputs 1-16 (via PCF8574 expanders).
  # Y01-Y16 are paired with OI-6950 gas channels 1-16; they activate automatically
  # when a channel reading meets or exceeds gas_alarm_threshold.

  - platform: gpio
    name: "${friendly_name} Relay Y01"
    id: relay_y01
    pin:
      pcf8574: outputs_1_8
      number: 0
      mode: OUTPUT
      inverted: true

  - platform: gpio
    name: "${friendly_name} Relay Y02"
    id: relay_y02
    pin:
      pcf8574: outputs_1_8
      number: 1
      mode: OUTPUT
      inverted: true

  - platform: gpio
