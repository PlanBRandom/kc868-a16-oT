# ESPHome Configuration: KC868-A16 + OI-6950 Modbus Bridge
#
# Reads gas-concentration data from an OI-6950 gas monitor via RS485 Modbus RTU
# and exposes it to Home Assistant through the native API, MQTT auto-discovery,
# and a Bluetooth proxy.  Each of the 16 relay/MOSFET outputs is automatically
# activated when its paired gas channel exceeds the alarm threshold.
#
# Hardware: KinCony KC868-A16 (ESP32, LAN8720 Ethernet, RS485, 16×I + 16×O via PCF8574)
# Device:   OI-6950 gas monitor / repeater (Modbus RTU slave, 9600 8N1)
#
# Register sources:
#   - Channel gas readings: PlanBRandom/teleproject – teleprogject32.yaml
#     (validated with OI-7530/7010; address = 0x21 + (channel-1)×2)
#   - System registers: PlanBRandom/anjoytell – MODBUS_DOCUMENTATION.md
#     (supply voltage 6052-6053, firmware 9900-9901, fault LED 6012)

substitutions:
  device_name: kc868-a16-oi6950
  friendly_name: "KC868-A16 OI-6950"
  # OI-6950 Modbus slave address (register 6000 on the device, default = 1).
  # Change per-unit when multiple devices share one RS485 bus.
  modbus_address: "0x01"
  # How often to poll the OI-6950 (matches the teleproject default).
  modbus_update_interval: "5s"
  # Gas concentration (ppm) at or above which a relay output is activated.
  gas_alarm_threshold: "10.0"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  # Appends the last 3 octets of the MAC address so each of the 30 units
  # gets a unique device name from a single firmware image.
  name_add_mac_suffix: true

esp32:
  board: esp32dev
  framework:
    type: arduino

# Disable serial logger so the hardware UART is available for Modbus RS485.
logger:
  level: INFO
  baud_rate: 0

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

# ─── Networking ───────────────────────────────────────────────────────────────

# KC868-A16 primary network: LAN8720 Ethernet (GPIO17 used as CLK_OUT).
ethernet:
  type: LAN8720
  mdc_pin: GPIO23
  mdio_pin: GPIO18
  clk:
    pin: GPIO17
    mode: CLK_OUT
  phy_addr: 0

# WiFi fallback access point when Ethernet is unavailable.
wifi:
  ap:

captive_portal:

# MQTT: direct publishing to the broker and Home Assistant auto-discovery.
# Mirrors the approach used in PlanBRandom/teleproject – teleprogject32.yaml.
mqtt:
  broker: !secret mqtt_broker
  username: !secret mqtt_username
  password: !secret mqtt_password
  discovery: true
  discovery_prefix: homeassistant

# ─── Bluetooth Proxy ──────────────────────────────────────────────────────────

esp32_ble_tracker:
  scan_parameters:
    interval: 1100ms
    window: 1100ms
    active: true

bluetooth_proxy:
  active: true

# ─── I²C + PCF8574 I/O expanders ─────────────────────────────────────────────

i2c:
  sda: GPIO4
  scl:
    number: GPIO5
    ignore_strapping_warning: true

pcf8574:
  - id: inputs_1_8
    address: 0x22
    pcf8575: false
  - id: inputs_9_16
    address: 0x21
    pcf8575: false
  - id: outputs_1_8
    address: 0x24
    pcf8575: false
  - id: outputs_9_16
    address: 0x25
    pcf8575: false

# ─── RS485 / Modbus ───────────────────────────────────────────────────────────

# KC868-A16 RS485: TX = GPIO13, RX = GPIO16.
# Direction control is handled by the on-board RS485 transceiver; no DE pin needed.
uart:
  id: mod_bus
  tx_pin: GPIO13
  rx_pin: GPIO16
  baud_rate: 9600
  stop_bits: 1
  parity: NONE

modbus:
  id: modbus1
  uart_id: mod_bus

modbus_controller:
  - id: oi6950
    address: ${modbus_address}
    modbus_id: modbus1
    setup_priority: -10
    update_interval: ${modbus_update_interval}

# ─── Sensors ──────────────────────────────────────────────────────────────────

sensor:
  - platform: wifi_signal
    name: "${friendly_name} WiFi Signal"
    update_interval: 60s

  # OI-6950 monitor supply voltage (holding registers 6052-6053, float32).
  # Ref: anjoytell/MODBUS_DOCUMENTATION.md – firmware v5.1.2+
  - platform: modbus_controller
    modbus_controller_id: oi6950
    name: "${friendly_name} Supply Voltage"
    address: 6052
    register_type: holding
    value_type: FP32
    unit_of_measurement: "V"
    device_class: voltage
    accuracy_decimals: 2

  # OI-6950 gas channel readings (float32, ppm).
  # Address = 0x21 + (channel-1) × 2  →  Ch1=0x21, Ch2=0x23, … Ch16=0x3F
  # Each channel drives the matching KC868-A16 relay output via on_value.

  - platform: modbus_controller
    modbus_controller_id: oi6950
    id: ch1_gas
    name: "${friendly_name} Channel 1 Gas"
    address: 0x21
    register_type: holding
    value_type: FP32
    unit_of_measurement: "ppm"
    device_class: gas
    accuracy_decimals: 2
    on_value:
      then:
        - if:
            condition:
              lambda: 'return x >= ${gas_alarm_threshold};'
            then:
              - switch.turn_on: relay_y01
            else:
              - switch.turn_off: relay_y01

  - platform: modbus_controller
    modbus_controller_id: oi6950
    id: ch2_gas
    name: "${friendly_name} Channel 2 Gas"
    address: 0x23
    register_type: holding
    value_type: FP32
