# ─── Text Sensors ─────────────────────────────────────────────────────────────

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "${friendly_name} IP Address"
    ssid:
      name: "${friendly_name} Connected SSID"

# ─── Binary Sensors ───────────────────────────────────────────────────────────

binary_sensor:
  - platform: status
    name: "${friendly_name} Status"

  # KC868-A16 digital inputs 1-16 (via PCF8574 expanders).
  - platform: gpio
    name: "${friendly_name} Input 01"
    pin:
      pcf8574: inputs_1_8
      number: 0
      mode: INPUT
      inverted: true

  - platform: gpio
    name: "${friendly_name} Input 02"
    pin:
      pcf8574: inputs_1_8
      number: 1
      mode: INPUT
      inverted: true

  - platform: gpio
    name: "${friendly_name} Input 03"
    pin:
      pcf8574: inputs_1_8
      number: 2
      mode: INPUT
      inverted: true

  - platform: gpio
    name: "${friendly_name} Input 04"
    pin:
      pcf8574: inputs_1_8
      number: 3
      mode: INPUT
      inverted: true

  - platform: gpio
    name: "${friendly_name} Input 05"
    pin:
      pcf8574: inputs_1_8
      number: 4
      mode: INPUT
      inverted: true

  - platform: gpio
